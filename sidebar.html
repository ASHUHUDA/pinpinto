<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PinPinto 侧边栏</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/src/sidebar.css">
</head>

<body>
    <div class="glass-bg"></div>
    <div class="sidebar-container">

        <header class="sidebar-header">
            <div class="logo-wrapper">
                <img src="icons/icon32.png" alt="Logo" class="logo">
            </div>
            <div class="header-info">
                <h1>PinPinto</h1>
                <span class="badge-version">v1.2.3</span>
            </div>
        </header>

        <div class="status-section">
            <div class="connection-status" id="connectionStatus">
                <span class="status-indicator" id="statusIndicator"></span>
                <span id="statusText" class="status-text">检查中...</span>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalImages">0</div>
                <div class="stat-label">页面图片</div>
            </div>
            <div class="stat-card accent-card">
                <div class="stat-value" id="selectedCount">0</div>
                <div class="stat-label">已选择</div>
            </div>
        </div>

        <div class="panel-section">
            <h3 class="panel-title">快捷操作</h3>
            <div class="action-list">
                <button class="btn btn-outline" id="selectAllBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" class="icon" stroke="currentColor" stroke-width="2">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                    全选
                </button>
                <button class="btn btn-ghost" id="deselectAllBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" class="icon" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="9" y1="9" x2="15" y2="15"></line>
                        <line x1="15" y1="9" x2="9" y2="15"></line>
                    </svg>
                    清空
                </button>
            </div>

            <button class="btn btn-primary btn-large" id="downloadBtn" disabled>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="icon" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                下载已选
                <span class="badge-count" id="downloadCount">(0)</span>
            </button>
        </div>

        <div class="panel-section">
            <h3 class="panel-title">偏好设置</h3>

            <label class="setting-row">
                <span class="setting-text">优先高清图</span>
                <div class="toggle-wrapper">
                    <input type="checkbox" id="highQuality" checked class="toggle-input">
                    <div class="toggle-track"></div>
                </div>
            </label>

            <label class="setting-row">
                <span class="setting-text">隐私模式</span>
                <div class="toggle-wrapper">
                    <input type="checkbox" id="privacyMode" class="toggle-input">
                    <div class="toggle-track"></div>
                </div>
            </label>

            <label class="setting-row">
                <span class="setting-text">自动滚动</span>
                <div class="toggle-wrapper">
                    <input type="checkbox" id="autoScrollToggle" class="toggle-input">
                    <div class="toggle-track"></div>
                </div>
            </label>

            <label class="setting-row">
                <span class="setting-text">200图自动下(最多3次)</span>
                <div class="toggle-wrapper">
                    <input type="checkbox" id="autoBatchToggle" class="toggle-input">
                    <div class="toggle-track"></div>
                </div>
            </label>
        </div>

        <div class="progress-section" id="progressSection" style="display: none;">
            <div class="progress-info">
                <span class="progress-status" id="progressDetails">准备下载...</span>
                <span class="progress-percent" id="progressText">0%</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <button class="btn btn-ghost danger-text btn-block" id="cancelDownloadBtn">取消下载</button>
        </div>

        <div class="state-container" id="notPinterest" style="display: none;">
            <div class="state-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="2" y1="12" x2="22" y2="12"></line>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                </svg>
            </div>
            <h3 class="state-title">未检测到 Pinterest</h3>
            <p class="state-desc">切换到 Pinterest 页面后再使用侧边栏。</p>
            <button class="btn btn-primary" id="openPinterestBtn">打开 Pinterest</button>
        </div>

    </div>

    <script type="module" src="/src/sidebar.ts"></script>
</body>

</html>
