name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

concurrency:
  group: pinpinto-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        shell: pwsh
        run: corepack enable

      - name: Resolve pnpm store
        id: pnpm-store
        shell: pwsh
        run: '"store_path=$(corepack.cmd pnpm store path --silent)" >> $env:GITHUB_OUTPUT'

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.store_path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: corepack.cmd pnpm install --frozen-lockfile

      - name: Cache Playwright Chromium
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ runner.temp }}\ms-playwright
        run: corepack.cmd pnpm exec playwright install chromium

      - name: Verify tag version
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          if ($env:GITHUB_REF_NAME -ne "v$version") {
            throw "Tag $env:GITHUB_REF_NAME does not match package version $version"
          }

      - name: Verify source and Chrome build
        run: corepack.cmd pnpm run verify

      - name: Audit production dependencies
        run: corepack.cmd pnpm run audit:dependencies

      - name: Build browser artifacts
        run: corepack.cmd pnpm run build:browsers

      - name: Audit production artifacts
        run: corepack.cmd pnpm run audit:production

      - name: Run extension E2E
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ runner.temp }}\ms-playwright
        run: corepack.cmd pnpm run test:e2e

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $tag = "v$version"
          $assets = @(
            "artifacts/pinpinto-chrome-v$version.zip",
            "artifacts/pinpinto-firefox-v$version.xpi"
          )
          if (gh release view $tag --repo $env:GITHUB_REPOSITORY 2>$null) {
            gh release upload $tag @assets --clobber --repo $env:GITHUB_REPOSITORY
          } else {
            gh release create $tag @assets --verify-tag --generate-notes --latest --title "PinPinto $tag" --repo $env:GITHUB_REPOSITORY
          }

      - name: Upload Playwright evidence
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: release-playwright-evidence-${{ github.ref_name }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14
